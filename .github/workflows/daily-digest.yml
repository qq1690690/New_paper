name: Daily Infectious Disease Digest

on:
  schedule:
    - cron: "0 12 * * *" # 12:00 UTC daily — adjust to your timezone preference
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python src/main.py

      - name: Commit updated seen-articles state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_ids.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update seen articles state [skip ci]"
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          fi
